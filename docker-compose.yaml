version: "3.8"
services:
  private:
    restart: unless-stopped
    container_name: private
    build:
      context: .
      dockerfile: Dockerfile
    healthcheck:
      start_period: 20s
      test: ["CMD", "pgrep", "node"]
      interval: 15s
      timeout: 10s
      retries: 5
    environment:
      - IS_LOGGER
      - PORT
      - PG_HOST
      - PG_PORT
      - PG_USER
      - PG_PASSWORD
      - PG_DATABASE
      - RMQ_URL
      - RMQ_USER
      - RMQ_PASSWORD
      - RMQ_QUEUE_AGGREGATOR
      - RMQ_QUEUE_PRIVATE
    ports:
      - '3002:3002'
    networks:
      - shared-network
  postgres_private:
    image: postgres:16-alpine
    container_name: postgres_private
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: private
      POSTGRES_PASSWORD: testing123
      POSTGRES_DB: private
    volumes:
      - postgres_private_data:/var/lib/postgresql/data
      - postgres_private_backup:/backups
    networks:
      - shared-network

networks:
  shared-network:
    external: true
    name: shared-network

volumes:
  postgres_private_data:
  postgres_private_backup:
